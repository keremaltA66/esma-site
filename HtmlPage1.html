<!doctype html>
<html lang="tr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Esma</title>
    <style>
        :root {
            --r: 22px;
            --shadow: 0 22px 70px rgba(0,0,0,.14);
            --glass: rgba(255,255,255,.72);
            --border: rgba(0,0,0,.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
            background: radial-gradient(1100px 700px at 15% 20%, #ffe7f0 0%, transparent 55%), radial-gradient(900px 650px at 85% 35%, #e6f2ff 0%, transparent 55%), radial-gradient(1200px 900px at 55% 90%, #e9fff2 0%, transparent 60%), #fbfbff;
            color: #111;
            overflow: hidden;
        }

        /* Floating blobs */
        .blob {
            position: absolute;
            inset: auto;
            width: 360px;
            height: 360px;
            border-radius: 50%;
            filter: blur(30px);
            opacity: .55;
            animation: float 10s ease-in-out infinite;
            pointer-events: none;
        }

        .b1 {
            left: -120px;
            top: -140px;
            background: #ff7bbd;
        }

        .b2 {
            right: -160px;
            top: 40px;
            background: #6ad7ff;
            animation-duration: 12s;
        }

        .b3 {
            left: 20%;
            bottom: -220px;
            background: #7bffb7;
            animation-duration: 14s;
        }

        @keyframes float {
            0%,100% {
                transform: translate(0,0) scale(1);
            }

            50% {
                transform: translate(18px, -22px) scale(1.06);
            }
        }

        .card {
            position: relative;
            width: min(560px, 92vw);
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: var(--r);
            box-shadow: var(--shadow);
            padding: 26px 22px 20px;
            text-align: center;
            backdrop-filter: blur(12px);
            overflow: hidden;
        }

        .badge {
            display: inline-flex;
            gap: 8px;
            align-items: center;
            padding: 9px 12px;
            border-radius: 999px;
            border: 1px solid rgba(0,0,0,.08);
            background: rgba(255,255,255,.6);
            font-size: 13px;
            opacity: .85;
        }

        h1 {
            margin: 14px 0 10px;
            font-size: clamp(22px, 3.2vw, 34px);
            letter-spacing: -0.4px;
        }

        .msg {
            margin: 10px auto 18px;
            font-size: 18px;
            line-height: 1.55;
            max-width: 44ch;
            opacity: .92;
            min-height: 56px;
        }

        .btn {
            border: 0;
            cursor: pointer;
            padding: 12px 18px;
            border-radius: 16px;
            background: #111;
            color: #fff;
            font-weight: 750;
            font-size: 15px;
            transition: transform .08s ease, opacity .2s ease;
            box-shadow: 0 12px 28px rgba(0,0,0,.15);
        }

            .btn:hover {
                opacity: .92;
            }

            .btn:active {
                transform: scale(.98);
            }

        .hint {
            margin-top: 14px;
            font-size: 12.5px;
            opacity: .62;
        }

        /* Heart burst */
        .heart {
            position: absolute;
            font-size: 18px;
            animation: pop 900ms ease-out forwards;
            pointer-events: none;
            filter: drop-shadow(0 10px 16px rgba(255,105,180,.32));
        }

        @keyframes pop {
            0% {
                transform: translate(0,0) scale(.7);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            100% {
                transform: translate(var(--dx), var(--dy)) scale(1.2);
                opacity: 0;
            }
        }

        /* Confetti */
        canvas#confetti {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* Tiny shake */
        .shake {
            animation: shake 260ms ease-in-out;
        }

        @keyframes shake {
            0%,100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-3px);
            }

            50% {
                transform: translateX(3px);
            }

            75% {
                transform: translateX(-2px);
            }
        }

        /* Typewriter caret */
        .caret::after {
            content: "";
            display: inline-block;
            width: 10px;
            height: 1.1em;
            margin-left: 2px;
            transform: translateY(3px);
            background: rgba(0,0,0,.55);
            animation: blink 1s step-end infinite;
            border-radius: 3px;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }

        /* Reveal line */
        .subline {
            margin: 6px 0 0;
            font-size: 14px;
            opacity: .78;
            min-height: 18px;
        }
    </style>
</head>

<body>
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>

    <main class="card" id="card" role="main" aria-label="Esma için mini sayfa">
        <canvas id="confetti"></canvas>

        <div class="badge">✅ Site durumu: <b>EsmaCheck()</b> • 🔒 Tek kişilik erişim</div>

        <h1 id="title">Esma, sen misin?</h1>
        <div class="msg caret" id="msg">Aşağıdaki “Evet” butonuna bas 😌</div>
        <div class="subline" id="subline"></div>

        <button class="btn" id="yes">Evet</button>

        <div class="hint">Not: Butona basınca “tatlı mod” otomatik açılır 💗</div>
    </main>

    <script>
        // --- Utils
        const card = document.getElementById("card");
        const titleEl = document.getElementById("title");
        const msgEl = document.getElementById("msg");
        const subEl = document.getElementById("subline");
        const btn = document.getElementById("yes");

        function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

        async function typewriter(el, text, speed = 34) {
            el.classList.add("caret");
            el.textContent = "";
            for (let i = 0; i < text.length; i++) {
                el.textContent += text[i];
                // küçük doğal hız varyasyonu
                const jitter = Math.random() * 18;
                await sleep(speed + jitter);
            }
            el.classList.remove("caret");
        }

        function shake() {
            card.classList.remove("shake");
            void card.offsetWidth; // reflow
            card.classList.add("shake");
            setTimeout(() => card.classList.remove("shake"), 280);
        }

        // Vibration (mobile)
        function vibe() {
            try { if (navigator.vibrate) navigator.vibrate([30, 20, 30]); } catch (e) { }
        }

        // --- Heart burst
        function heartBurst(count = 14) {
            const rect = card.getBoundingClientRect();
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;

            const hearts = ["💗", "💖", "💘", "💕", "💞"];
            for (let i = 0; i < count; i++) {
                const h = document.createElement("div");
                h.className = "heart";
                h.textContent = hearts[Math.floor(Math.random() * hearts.length)];
                const x = centerX + (Math.random() * 80 - 40);
                const y = centerY + (Math.random() * 60 - 30);
                h.style.left = x + "px";
                h.style.top = y + "px";
                h.style.setProperty("--dx", (Math.random() * 220 - 110) + "px");
                h.style.setProperty("--dy", (Math.random() * -240 - 80) + "px");
                card.appendChild(h);
                setTimeout(() => h.remove(), 950);
            }
        }

        // --- Confetti (simple canvas particles, no libs)
        const canvas = document.getElementById("confetti");
        const ctx = canvas.getContext("2d");

        function resizeCanvas() {
            const r = card.getBoundingClientRect();
            canvas.width = Math.floor(r.width * devicePixelRatio);
            canvas.height = Math.floor(r.height * devicePixelRatio);
            canvas.style.width = r.width + "px";
            canvas.style.height = r.height + "px";
            ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
        }
        window.addEventListener("resize", resizeCanvas);
        resizeCanvas();

        function confettiBlast(durationMs = 900) {
            const particles = [];
            const w = canvas.clientWidth;
            const h = canvas.clientHeight;

            const pieces = 140;
            for (let i = 0; i < pieces; i++) {
                particles.push({
                    x: w / 2,
                    y: h / 2 + 10,
                    vx: (Math.random() * 6 - 3) * 2.2,
                    vy: (Math.random() * -6 - 2) * 2.2,
                    g: 0.12 + Math.random() * 0.08,
                    r: 2 + Math.random() * 3,
                    a: 1,
                    rot: Math.random() * Math.PI,
                    vr: (Math.random() * 0.2 - 0.1)
                });
            }

            const start = performance.now();
            function frame(t) {
                const elapsed = t - start;
                ctx.clearRect(0, 0, w, h);

                for (const p of particles) {
                    p.vy += p.g;
                    p.x += p.vx;
                    p.y += p.vy;
                    p.rot += p.vr;
                    p.a = Math.max(0, 1 - elapsed / durationMs);

                    ctx.globalAlpha = p.a;
                    // renk belirtmiyoruz (sen istemedin); default canvas fillStyle siyah olur.
                    // ama konfeti görünür olsun diye hafif transparan beyaz kullanıyoruz:
                    ctx.fillStyle = "rgba(0,0,0,0.45)";
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rot);
                    ctx.fillRect(-p.r, -p.r, p.r * 2.3, p.r * 1.2);
                    ctx.restore();
                }

                ctx.globalAlpha = 1;
                if (elapsed < durationMs) requestAnimationFrame(frame);
                else ctx.clearRect(0, 0, w, h);
            }
            requestAnimationFrame(frame);
        }

        // --- Main click
        let clicked = false;
        btn.addEventListener("click", async () => {
            if (clicked) return;
            clicked = true;

            shake(); vibe();
            btn.disabled = true;

            titleEl.textContent = "Esma 😌";
            subEl.textContent = "";

            // tatlı reveal: typewriter
            await typewriter(msgEl, "Çok güzelsin, haberin olsun.", 42);

            // küçük ek satır
            await sleep(150);
            subEl.textContent = "Bunu bir web sayfası bile doğruladı ✅";

            // effects
            heartBurst(18);
            confettiBlast(950);

            // Butonu kaldır
            await sleep(250);
            btn.style.display = "none";
        });

        // İlk mesaj küçük animasyon hissi
        (async () => {
            await sleep(220);
            // caret zaten var; küçük bir “hazır” hissi
            subEl.textContent = "Tek tuşluk doğrulama 😄";
        })();
    </script>
</body>
</html>
